services:
  database:
    image: postgres
    container_name: database
    restart: always
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 10s
      retries: 10

  backend:
    container_name: backend
    build:
      dockerfile: docker/backend/Dockerfile
      context: ../../
    ports:
      - "3001:3001"
    env_file:
      - ../../apps/backend/.env
    depends_on:
      database:
        condition: service_healthy

  web:
    container_name: web
    build:
      dockerfile: docker/web/Dockerfile
      context: ../../
    ports:
      - "3000:3000"
    env_file:
      - ../../apps/web/.env
